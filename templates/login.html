{% extends "base.html" %}

{% block title %}Login - {{ app_name }}{% endblock %}

{% block extra_css %}
<style>
    .app-container { display: none; }
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #1b4332 0%, #52b788 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
</style>
{% endblock %}

{% block auth_content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1><i class="fas fa-leaf"></i> {{ app_name }}</h1>
            <p>Halal Consultant Management System</p>
        </div>
        
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>

        <div class="login-footer">
            <p>Belum punya akun? <a href="{{ url_for('register') }}">Daftar di sini</a></p>
        </div>
    </div>
</div>

<style>
    .login-container {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .login-card {
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        padding: 40px;
        width: 100%;
        max-width: 400px;
    }

    .login-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .login-header h1 {
        color: #1b4332;
        margin: 0;
        font-size: 28px;
    }

    .login-header p {
        color: #666;
        margin: 5px 0 0 0;
        font-size: 14px;
    }

    .login-form .form-group {
        margin-bottom: 20px;
    }

    .login-form label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 600;
    }

    .login-form input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
        box-sizing: border-box;
    }

    .login-form input:focus {
        outline: none;
        border-color: #1b4332;
        box-shadow: 0 0 5px rgba(27, 67, 50, 0.3);
    }

    .btn-block {
        width: 100%;
        padding: 12px;
        font-size: 16px;
    }

    .login-footer {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
    }

    .login-footer a {
        color: #1b4332;
        text-decoration: none;
        font-weight: 600;
    }
</style>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        try {
            const response = await axios.post('{{ url_for("login") }}', {
                username,
                password
            });
            
            if (response.data.success) {
                window.location.href = response.data.redirect;
            }
        } catch (error) {
            alert(error.response.data.message || 'Login gagal');
        }
    });
</script>
{% endblock %}
